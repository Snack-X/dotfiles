################################################################################

# colorful terminal
set -g default-terminal "screen-256color"

# mouse capable
setw -g mouse on

# immediate escape key
set -sg escape-time 10

# window setting
set-window-option -g xterm-keys on
set-window-option -g automatic-rename on

# change terminal title
set -g set-titles on
set -g set-titles-string 'session[#S]->window[#I:#P] #W'

# 1-based window number
# `C-a 1-9` as window select
set -g base-index 1

# extend history
set -g history-limit 10000

################################################################################

# bind Ctrl+a as prefix
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# `C-a r` as reload config
unbind r
bind r source-file ~/.tmux.conf

# `C-a c` as create new window on current path
unbind c
bind c new-window -c "#{pane_current_path}"

# `M-<Arrow>` as window/session change
bind -n M-Left  previous-window
bind -n M-Right next-window
bind -n M-Up    switch-client -p
bind -n M-Down  switch-client -n

# `C-a -` as vertical split on current path
# `C-a |` as horizontal split on current path
unbind -
unbind |
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# `S-<Arrow>` as pane select
bind -n S-Left  select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up    select-pane -U
bind -n S-Down  select-pane -D

# `C-a S-<Arrow>` as pane resize
bind -r S-Left  resize-pane -L
bind -r S-Right resize-pane -R
bind -r S-Up    resize-pane -U
bind -r S-Down  resize-pane -D

################################################################################
# tmux powerline theme
# ref: https://github.com/jimeh/tmux-themepack

# Color Variables
%hidden C_BLACK=colour232
%hidden C_GRAY=colour243
%hidden C_WHITE=colour255
%hidden C_BLUE=blue

# Status update interval
set -g status-interval 1

# Basic status bar colors
set -g status-style fg=$C_GRAY,bg=$C_BLACK

# Left side of status bar
set -g status-left-length 50
set -g status-left "#[fg=$C_BLACK,bg=$C_BLUE,bold] sess[#S] #[fg=$C_BLUE,bg=$C_GRAY,nobold]#[fg=$C_BLACK,bg=$C_GRAY,bold] window[#I:#P] #[fg=$C_GRAY,bg=$C_BLACK,nobold]"

# Right side of status bar
set -g status-right-length 50
set -g status-right "#[fg=$C_GRAY,bg=$C_BLACK]#[fg=$C_BLACK,bg=$C_GRAY,bold] %Y-%m-%d #[fg=$C_BLUE,bg=$C_GRAY,nobold]#[fg=$C_BLACK,bg=$C_BLUE,bold] %H:%M:%S "

# Window status
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "

# Current window status
set -g window-status-current-style fg=$C_BLACK,bg=$C_BLUE

# Window with activity status
set -g window-status-activity-style fg=$C_BLUE,bg=$C_BLACK

# Window separator
set -g window-status-separator ""

# Window status alignment
set -g status-justify centre

# Pane border
set -g pane-border-style fg=$C_GRAY,bg=default

# Active pane border
set -g pane-active-border-style fg=$C_BLUE,bg=default

# Pane number indicator
set -g display-panes-colour $C_BLACK
set -g display-panes-active-colour $C_GRAY

# Clock mode
set -g clock-mode-colour $C_BLUE
set -g clock-mode-style 24

# Mode
set -g mode-style fg=$C_WHITE,bg=$C_BLUE
